<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Sports Event Operations</title>
    <style>
        /* Editorial Styling Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0d0f12; color: #ffffff; overflow-x: hidden; }
        
        header { padding: 80px 4% 40px 4%; max-width: 1600px; margin: 0 auto; }
        .logo-area { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .logo-area h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .logo-area .status { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #8a929a; border: 1px solid #333; padding: 8px 16px; border-radius: 50px; }
        
        .hero-text { font-size: clamp(1.8rem, 4vw, 3.2rem); font-weight: 400; line-height: 1.2; max-width: 1100px; color: #f5f5f7; letter-spacing: -1px; }
        .hero-text span { color: #8a929a; }

        /* Nahtloses Grid ohne Lücken (Seamless Grid) */
        .portfolio-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 0px; padding: 0; max-width: 100vw; margin: 40px auto 80px auto; border-top: 1px solid #16191f; border-bottom: 1px solid #16191f; }
        
        .grid-item { position: relative; background-color: #16191f; min-height: 500px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Grid Größen-Aufteilung */
        .size-large { grid-column: span 8; }
        .size-medium { grid-column: span 4; }
        .size-wide { grid-column: span 6; }

        /* Hintergrundbilder */
        .grid-item img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); transition: filter 0.4s ease; z-index: 1; }
        .grid-item:hover img { filter: brightness(25%); }

        /* Text & Button exakt zentriert im mittleren Bereich */
        .item-content { position: relative; z-index: 2; max-width: 85%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item-tag { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #ff2a5f; font-weight: 700; margin-bottom: 12px; display: block; }
        .item-title { font-size: clamp(1.5rem, 2.5vw, 2.2rem); font-weight: 800; margin-bottom: 25px; letter-spacing: -0.5px; text-transform: uppercase; line-height: 1.2; }
        
        /* Das klickbare Kästchen / Button unter der Schrift */
        .info-btn { display: inline-block; background-color: rgba(255, 255, 255, 0.15); border: 2px solid #ffffff; color: #ffffff; padding: 14px 28px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; border-radius: 0px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px); }
        .info-btn:hover { background-color: #ffffff; color: #0d0f12; }

        /* POP-UP BOX (Modal) STYLING */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(13, 15, 18, 0.9); backdrop-filter: blur(15px); justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
        .modal.show { display: flex; opacity: 1; }
        
        .modal-content { background-color: #16191f; border: 1px solid #2d3139; padding: 50px 40px; border-radius: 0px; max-width: 650px; width: 100%; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; color: #8a929a; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: #ffffff; }
        
        .modal-tag { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #ff2a5f; font-weight: 700; margin-bottom: 15px; display: block; }
        .modal-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.5px; text-transform: uppercase; }
        .modal-desc { font-size: 1.05rem; color: #cdced4; line-height: 1.6; font-weight: 300; }

        footer { background-color: #000000; padding: 120px 4%; text-align: center; }
        .footer-text { font-size: clamp(2rem, 5vw, 4rem); font-weight: 700; letter-spacing: -2px; margin-bottom: 40px; }
        .mail-btn { display: inline-block; font-size: 1.2rem; color: #ffffff; text-decoration: none; border-bottom: 2px solid #ff2a5f; padding-bottom: 8px; transition: color 0.3s; font-weight: 600; }
        .mail-btn:hover { color: #ff2a5f; }

        @media (max-width: 900px) {
            .portfolio-grid { grid-template-columns: 1fr; display: flex; flex-direction: column; }
            .grid-item { grid-column: span 12 !important; min-height: 450px !important; }
        }
    </style>
</head>
