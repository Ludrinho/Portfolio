<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Sports Event Operations</title>
    <style>
        /* Editorial Styling Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #0d0f12; color: #ffffff; overflow-x: hidden; }
        
        /* Großzügigerer Header mit edlen Farbakzenten */
        header { 
            padding: 80px 4% 50px 4%; 
            max-width: 1600px; 
            margin: 0 auto; 
            position: relative;
        }
        
        /* Sanfter Lichtkegel im Hintergrund, der die Schrift edel abhebt */
        header::before {
            content: "";
            position: absolute;
            top: -50px;
            left: 4%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 42, 95, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .logo-area { 
            position: relative;
            z-index: 1;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 45px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 25px;
        }
        
        .logo-area h1 { 
            font-size: 2.2rem; 
            font-weight: 900; 
            letter-spacing: -1.5px; 
            text-transform: uppercase; 
            background: linear-gradient(180deg, #ffffff 0%, #a5a7ab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-right { display: flex; align-items: center; gap: 30px; }
        
        /* Cleaner Look für die Links */
        .social-links { display: flex; gap: 20px; }
        .social-links a { 
            color: #8a929a; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease; 
        }
        .social-links a:hover { color: #ff2a5f; }
        
        /* Status-Box mit dezentem, pulsierendem Live-Punkt */
        .logo-area .status { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #ffffff; 
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 8px 18px; 
            border-radius: 50px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-area .status::before {
            content: "";
            width: 6px;
            height: 6px;
            background-color: #00ff66; 
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff66;
        }
        
        /* Großzügiger, fließender Text mit farblichem Highlight */
        .hero-text { 
            position: relative;
            z-index: 1;
            font-size: clamp(1.6rem, 3.5vw, 2.8rem); 
            font-weight: 400; 
            line-height: 1.35; 
            max-width: 1150px; 
            color: #f5f5f7; 
            letter-spacing: -0.5px; 
        }
        .hero-text .highlight { 
            color: #ff2a5f; 
            font-weight: 600;
        }
        .hero-text span { color: #8a929a; display: block; margin-top: 15px; font-size: 0.65em; font-weight: 300; letter-spacing: 0px; }

        /* Seamless Grid */
        .portfolio-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 2px; 
            padding: 0; 
            max-width: 100vw; 
            margin: 50px auto 80px auto; 
            background-color: #16191f;
        }
        
        /* Standard Kacheln */
        .grid-item { 
            position: relative; 
            background-color: #16191f; 
            height: 500px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 30px; 
            overflow: hidden;
        }

        /* Hero Kachel (Icon League) - Text nach oben rechts verschoben */
        .grid-item.hero-item {
            grid-column: span 2;
            height: 480px; 
            align-items: flex-end; 
            justify-content: flex-start; 
            padding-top: 80px; 
            padding-right: 8%; 
        }

        .hero-item .item-content {
            align-items: flex-end;
            text-align: right;
        }

        /* Bilder standardmäßig hell */
        .grid-item img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: brightness(80%) contrast(105%); 
            transition: transform 0.5s ease, filter 0.5s ease; 
            z-index: 1; 
        }
        
        .grid-item:hover img { 
            filter: brightness(90%) contrast(110%);
            transform: scale(1.02); 
        }

        /* Text & Button Layout */
        .item-content { position: relative; z-index: 2; max-width: 85%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item-tag { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #ff2a5f; font-weight: 700; margin-bottom: 12px; display: block; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .item-title { font-size: clamp(1.4rem, 2vw, 2.2rem); font-weight: 800; margin-bottom: 25px; letter-spacing: -0.5px; text-transform: uppercase; line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,0.9); }
        
        /* Button Style */
        .info-btn { display: inline-block; background-color: rgba(13, 15, 18, 0.7); border: 2px solid #ffffff; color: #ffffff; padding: 14px 28px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 3; }
        .info-btn:hover { background-color: #ffffff; color: #0d0f12; }

        /* POP-UP BOX (Modal) STYLING */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(13, 15, 18, 0.9); backdrop-filter: blur(15px); justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
        .modal.show { display: flex; opacity: 1; }
        
        .modal-content { background-color: #16191f; border: 1px solid #2d3139; padding: 50px 40px; max-width: 650px; width: 100%; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; color: #8a929a; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: #ffffff; }
        
        .modal-tag { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #ff2a5f; font-weight: 700; margin-bottom: 15px; display: block; }
        .modal-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.5px; text-transform: uppercase; }
        .modal-desc { font-size: 1.05rem; color: #cdced4; line-height: 1.6; font-weight: 300; margin-bottom: 30px; white-space: pre-line; }

        .modal-socials { display: flex; gap: 20px; border-top: 1px solid #2d3139; padding-top
